<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Вертикальный Кот</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div class="overlay" id="menuOverlay">
            <h1 class="menu-title">ВЕРТИКАЛЬНЫЙ КОТ</h1>
            <p class="menu-subtitle">Пролети через все уровни и сбеги от опасностей!</p>
            <div class="level-indicator" id="levelIndicator">Уровень: 1/6</div>
            <div class="stats-display">
                <div class="stat">
                    <div class="stat-value" id="menuCoins">0</div>
                    <div class="stat-label">Монеты</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="menuLives">0</div>
                    <div class="stat-label">Жизни</div>
                </div>
            </div>
            <button class="btn btn-primary" id="btnPlay">ИГРАТЬ</button>
            <button class="btn btn-secondary" id="btnShop">МАГАЗИН</button>
        </div>
        
        <div class="overlay hidden" id="shopOverlay">
            <h2 class="menu-title">МАГАЗИН</h2>
            <div class="coins-display" id="shopCoins">0</div>
            <div class="shop-grid" id="shopGrid"></div>
            <button class="btn btn-secondary" id="btnShopBack">НАЗАД</button>
        </div>
        
        <div class="overlay hidden" id="deathOverlay">
            <div class="death-screen">
                <h2 class="death-title" id="deathTitle">КОТ УПАЛ!</h2>
                <p class="menu-subtitle" id="deathMessage">Ваза разбилась...</p>
                <button class="btn btn-primary" id="btnRestart">ЗАНОВО</button>
                <button class="btn btn-secondary" id="btnMenu">МЕНЮ</button>
            </div>
        </div>
        
        <div class="overlay hidden" id="winOverlay">
            <h2 class="final-title">ПОБЕДА!</h2>
            <p class="menu-subtitle">Ты прошел все 6 уровней!</p>
            <div class="reward-banner" id="rewardBanner">
                <h3>Разблокирован: ЗОЛОТОЙ КОТ!</h3>
            </div>
            <div class="stats-display">
                <div class="stat">
                    <div class="stat-value" id="finalCoins">0</div>
                    <div class="stat-label">Всего монет</div>
                </div>
            </div>
            <button class="btn btn-primary" id="btnWinMenu">В МЕНЮ</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</html>
